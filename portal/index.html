<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0b0d12">
<link rel="manifest" href="/manifest.webmanifest">
<title>Agent OS Engineering Portal</title>
<style>
:root{color-scheme:dark;--bg:#0b0d12;--panel:#141925;--line:#293042;--text:#edf2fb;--muted:#98a3b8;--accent:#8d9cff}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:14px/1.5 system-ui,-apple-system,sans-serif}a{color:inherit}.top{position:sticky;top:0;z-index:3;display:flex;align-items:center;gap:18px;padding:13px 20px;border-bottom:1px solid var(--line);background:#0b0d12ee}.brand{font-weight:800;text-decoration:none}.nav{display:flex;gap:5px;flex:1}.nav a{padding:7px 10px;color:var(--muted);text-decoration:none;border-radius:8px}.nav a:hover,.nav a.on{color:var(--text);background:var(--panel)}main{max-width:1450px;margin:auto;padding:28px}.hero{display:grid;grid-template-columns:1.5fr 1fr;gap:24px;padding:44px 0 28px}.hero h1{font-size:clamp(36px,5vw,70px);line-height:1.02;margin:.15em 0}.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent)}.lede{font-size:18px;color:var(--muted);max-width:760px}.card,.metric,.item{background:linear-gradient(180deg,#171c29,#11151e);border:1px solid var(--line);border-radius:14px;padding:16px}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.metric strong{font-size:30px;display:block}.metric span,.small{color:var(--muted)}.actions,.toolbar{display:flex;gap:9px;flex-wrap:wrap}.btn{display:inline-block;text-decoration:none;border:1px solid var(--line);background:var(--panel);padding:9px 12px;border-radius:9px}.btn.primary{background:var(--accent);color:#090b10;border-color:transparent;font-weight:750}.sectionhead{display:flex;justify-content:space-between;align-items:end;gap:18px;margin:30px 0 12px}.sectionhead h1,.sectionhead h2{margin:0}.toolbar{margin:14px 0}.toolbar input,.toolbar select{background:#0f131c;color:var(--text);border:1px solid var(--line);border-radius:9px;padding:10px}.toolbar input{min-width:280px;flex:1}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}.item{text-decoration:none}.item:hover{border-color:#55628e}.id{font:12px ui-monospace,monospace;color:var(--accent)}.pill{display:inline-block;border:1px solid var(--line);border-radius:99px;padding:2px 7px;margin:2px;color:var(--muted);font-size:11px}.tablewrap{overflow:auto;border:1px solid var(--line);border-radius:13px}table{width:100%;border-collapse:collapse;min-width:850px}th,td{padding:10px 12px;border-bottom:1px solid var(--line);text-align:left}th{background:#111620;color:var(--muted);font-size:12px}.empty{padding:40px;text-align:center;color:var(--muted)}.bar{height:14px;background:var(--accent);border-radius:5px}.notice{border-left:3px solid var(--accent);padding:10px 14px;background:var(--panel);color:var(--muted)}@media(max-width:760px){main{padding:16px}.top{padding:10px}.hero{grid-template-columns:1fr;padding-top:20px}.metrics{grid-template-columns:repeat(2,1fr)}.toolbar input{min-width:100%}.gh{display:none}}
</style>
</head>
<body>
<header class="top"><a class="brand" href="#home">Agent OS</a><nav class="nav"><a href="#wiki">Wiki</a><a href="#tasks">Tasks</a><a href="#gantt">Gantt</a><a href="#api">API</a></nav><a class="gh" id="repo-link" href="#">GitHub ↗</a></header>
<main id="app"><div class="empty">Loading…</div></main>
<script>
const candidates=['alex-mextner/AgentOS','alex-mextner/HyperOS'];let R=candidates[0],issues=[];const app=document.querySelector('#app');const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
async function resolveRepo(){for(const repo of candidates){const r=await fetch('https://api.github.com/repos/'+repo);if(r.ok){R=repo;break}}document.querySelector('#repo-link').href='https://github.com/'+R}
async function boot(){await resolveRepo();try{const r=await fetch('https://api.github.com/repos/'+R+'/issues?state=all&per_page=100');issues=(await r.json()).filter(x=>!x.pull_request)}catch{issues=[]}route()}
function gh(path=''){return 'https://github.com/'+R+path}function nav(v){document.querySelectorAll('.nav a').forEach(a=>a.classList.toggle('on',a.hash==='#'+v))}
function home(){nav('home');app.innerHTML=`<section class="hero"><div><div class="eyebrow">Public · Git-backed · API-first</div><h1>An engineering operating system for building an operating system.</h1><p class="lede">Open specifications, GitHub-native tasks, evidence records and a Gantt projection for the original Rust-first microkernel programme.</p><div class="actions"><a class="btn primary" href="#wiki">Read the Wiki</a><a class="btn" href="#tasks">Open tasks</a></div></div><aside class="card"><div class="eyebrow">Architecture rule</div><h2>Owned native stack</h2><p class="small">Android and Linux are isolated to Pixel 9 evidence and bring-up work. Portable device contracts remain native and hot data paths use zero-copy buffers rather than generic translation.</p></aside></section><section class="metrics"><div class="metric"><strong>141</strong><span>planned documents</span></div><div class="metric"><strong>327</strong><span>planned work items</span></div><div class="metric"><strong>${issues.length}</strong><span>GitHub issues now</span></div><div class="metric"><strong>9</strong><span>implementation phases</span></div></section>`}
const docs=[['AOS-BRIEFING','Executive briefing','Programme scope and architectural baseline','BRIEFING.md'],['AOS-INDEX','Documentation index','Cross-linked index of the engineering corpus','docs/INDEX.md'],['AOS-ARCH-001','Portable system architecture','Native portable layer and performance boundaries','docs/architecture/ARCH-001-portable-system-architecture.md'],['AOS-ARCH-002','Microkernel','Kernel object, scheduling and isolation model','docs/architecture/ARCH-002-microkernel.md'],['AOS-HW-001','Hardware portfolio','Open boards, Pixel 9 and later device tracks','docs/hardware/HW-001-target-portfolio.md'],['AOS-PLAN-002','Roadmap and Gantt','Nine implementation phases and dependencies','docs/planning/PLAN-002-roadmap-and-gantt.md'],['AOS-GLOSSARY','Glossary','Detailed engineering terminology index','docs/glossary/GLOSSARY.md']];
function wiki(){nav('wiki');app.innerHTML=`<div class="sectionhead"><div><div class="eyebrow">Canonical Markdown</div><h1>Wiki</h1></div><a class="btn" href="${gh('/tree/main/knowledge')}">Browse source ↗</a></div><div class="grid">${docs.map(d=>`<a class="item" href="${gh('/blob/main/knowledge/'+d[3])}"><span class="id">${d[0]}</span><h3>${d[1]}</h3><p class="small">${d[2]}</p></a>`).join('')}</div>`}
function tasks(){nav('tasks');app.innerHTML=`<div class="sectionhead"><div><div class="eyebrow">GitHub Issues</div><h1>Tasks</h1></div><a class="btn primary" href="${gh('/issues/new/choose')}">New task ↗</a></div><div class="toolbar"><input id="q" placeholder="Search issues"><select id="st"><option value="">All states</option><option>open</option><option>closed</option></select></div><div class="tablewrap"><table><thead><tr><th>#</th><th>Task</th><th>State</th><th>Labels</th><th>Updated</th></tr></thead><tbody id="rows"></tbody></table></div>`;let q='',st='';const draw=()=>{const xs=issues.filter(x=>(!q||(x.title+' '+(x.body||'')).toLowerCase().includes(q.toLowerCase()))&&(!st||x.state===st));document.querySelector('#rows').innerHTML=xs.map(x=>`<tr><td><a href="${x.html_url}">#${x.number}</a></td><td><strong>${esc(x.title)}</strong><div class="small">${esc((x.body||'').slice(0,150))}</div></td><td>${x.state}</td><td>${x.labels.map(l=>`<span class="pill">${esc(l.name)}</span>`).join('')}</td><td>${x.updated_at.slice(0,10)}</td></tr>`).join('')||'<tr><td colspan="5" class="empty">No issues yet. Run the bootstrap workflow or create the first task.</td></tr>'};document.querySelector('#q').oninput=e=>{q=e.target.value;draw()};document.querySelector('#st').onchange=e=>{st=e.target.value;draw()};draw()}
function gantt(){nav('gantt');const phases=['Source intake and decisions','Research and feasibility','Portable contracts','Normative specifications','Rust engineering baseline','QEMU scaffold','Microkernel vertical slice','Physical hardware and Pixel 9 evidence','Publication and community launch'];app.innerHTML=`<div class="sectionhead"><div><div class="eyebrow">Phase baseline</div><h1>Gantt</h1></div><a class="btn" href="${gh('/projects')}">GitHub Projects ↗</a></div><div class="notice">This initial projection shows the programme phases. Issue-level dependency arrows and critical path become authoritative after the task and Project-field import.</div><div class="tablewrap"><table><thead><tr><th>Phase</th><th>Work</th><th>Relative schedule</th></tr></thead><tbody>${phases.map((p,i)=>`<tr><td>Phase ${i}</td><td>${p}</td><td><div class="bar" style="margin-left:${i*5}%;width:${18+(i%3)*8}%"></div></td></tr>`).join('')}</tbody></table></div>`}
function api(){nav('api');app.innerHTML=`<div class="sectionhead"><div><div class="eyebrow">Public APIs</div><h1>API</h1></div></div><div class="grid"><a class="item" href="https://api.github.com/repos/${R}/issues"><span class="id">GET</span><h3>GitHub Issues API</h3></a><a class="item" href="https://api.github.com/repos/${R}/contents"><span class="id">GET</span><h3>Repository contents</h3></a><a class="item" href="${gh('/actions')}"><span class="id">ACTIONS</span><h3>Import and validation workflows</h3></a></div>`}
function route(){const p=location.hash.slice(1)||'home';p==='wiki'?wiki():p==='tasks'?tasks():p==='gantt'?gantt():p==='api'?api():home();scrollTo(0,0)}addEventListener('hashchange',route);boot();
</script>
</body>
</html>
