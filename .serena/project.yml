# the name by which the project can be referenced within Serena
project_name: "agent-os"


# list of languages for which language servers are started; choose from:
#   al                  angular             ansible             bash                clojure
#   cpp                 cpp_ccls            crystal             csharp              csharp_omnisharp
#   dart                elixir              elm                 erlang              fortran
#   fsharp              go                  groovy              haskell             haxe
#   hlsl                html                java                json                julia
#   kotlin              lean4               lua                 luau                markdown
#   matlab              msl                 nix                 ocaml               pascal
#   perl                php_phpactor        powershell          python
#   python_jedi         python_ty           r                   rego                ruby
#   ruby_solargraph     rust                scala               scss                solidity
#   svelte              swift               systemverilog       terraform           toml
#   typescript          typescript_vts      vue                 yaml                zig
#   (This list may be outdated. For the current list, see values of Language enum here:
#   https://github.com/oraios/serena/blob/main/src/solidlsp/ls_config.py
#   For some languages, there are alternative language servers, e.g. csharp_omnisharp, ruby_solargraph.)
# Note:
#   - For C, use cpp
#   - For JavaScript, use typescript
#   - For Angular, use angular (subsumes typescript+html; requires `npm install` in the project root)
#   - For Svelte, use svelte (subsumes typescript/javascript for .svelte files; requires `npm install`)
#   - For SCSS / Sass / plain CSS, use scss (some-sass-language-server handles all three)
#   - For Free Pascal/Lazarus, use pascal
# Special requirements:
#   Some languages require additional setup/installations.
#   See https://oraios.github.io/serena/01-about/020_programming-languages.html#language-servers
# When using multiple languages, the first language server that supports a given file will be used.
# The first language is the default and is used as a fallback.
# When using the JetBrains backend, language servers are not used.
languages: []

# the encoding used by text files
encoding: "utf-8"

# line ending convention: unset, lf, crlf, or native
line_ending:

# language backend: LSP or JetBrains
language_backend:

# whether to use project .gitignore files
ignore_all_files_in_gitignore: true

# language-server-specific options
ls_specific_settings: {}

# additional TypeScript workspace folders
additional_workspace_folders: []

# additional paths to ignore
ignored_paths: []

# disable editing tools when true
read_only: false

# tools to exclude
excluded_tools: []

# optional tools to include
included_optional_tools: []

# fixed base tool set; cannot be combined with exclusions/inclusions
fixed_tools: []

# default project modes
default_modes:

# additional project modes
added_modes:

# prompt supplied when activating the project
initial_prompt: "Agent OS is an original Rust-first mobile operating-system programme. Preserve the owned microkernel and native portable-contract boundaries. Keep Android/Linux limited to the Pixel 9 evidence and bring-up track."

# time budget for retrieving additional symbol information
symbol_info_budget:

# memory paths that are read-only
read_only_memory_patterns: []

# memory paths to ignore
ignored_memory_patterns: []
