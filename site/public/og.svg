<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">
  <!-- Agent OS social card. Signature: the app-last entity graph — one object at the
       centre, many replaceable views orbiting it — mirroring AppLastDiagram on the site. -->
  <rect width="1200" height="630" fill="#09090b"/>

  <!-- Faint structural grid -->
  <g stroke="#18181b" stroke-width="1">
    <path d="M0 90H1200M0 180H1200M0 270H1200M0 360H1200M0 450H1200M0 540H1200"/>
    <path d="M120 0V630M240 0V630M360 0V630M480 0V630M600 0V630M720 0V630M840 0V630M960 0V630M1080 0V630"/>
  </g>

  <!-- Azure glow behind the graph -->
  <rect width="1200" height="630" fill="url(#glow)"/>
  <defs>
    <radialGradient id="glow" cx="0.83" cy="0.5" r="0.55">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ================= LEFT: thesis ================= -->
  <g transform="translate(80,116)">
    <circle cx="6" cy="-6" r="6" fill="#60a5fa"/>
    <text x="26" y="0" font-size="20" font-weight="600" letter-spacing="3.5" fill="#60a5fa">APP-LAST · LOCAL-FIRST · AGENT-NATIVE</text>
  </g>

  <text x="78" y="290" font-size="78" font-weight="700" letter-spacing="-2" fill="#fafafa">Your work is</text>
  <text x="78" y="378" font-size="78" font-weight="700" letter-spacing="-2" fill="#fafafa">the interface.</text>
  <text x="80" y="452" font-size="32" font-weight="500" fill="#a1a1aa">Not a grid of apps.</text>

  <!-- Wordmark -->
  <g transform="translate(80,548)">
    <rect x="-2" y="-26" width="6" height="34" rx="3" fill="#60a5fa"/>
    <text x="22" y="0" font-family="ui-monospace, 'DejaVu Sans Mono', monospace" font-size="27" font-weight="700" letter-spacing="0.5" fill="#fafafa">Agent OS</text>
    <text x="182" y="0" font-family="ui-monospace, 'DejaVu Sans Mono', monospace" font-size="19" fill="#52525b">agentos-bible.vercel.app</text>
  </g>

  <!-- ================= RIGHT: entity graph ================= -->
  <g transform="translate(1002,315)">
    <!-- edges from centre to each orbiting node -->
    <g stroke="#3f3f46" stroke-width="1.5">
      <line x1="0" y1="0" x2="0" y2="-140"/>
      <line x1="0" y1="0" x2="121" y2="-70"/>
      <line x1="0" y1="0" x2="121" y2="70"/>
      <line x1="0" y1="0" x2="0" y2="140"/>
      <line x1="0" y1="0" x2="-121" y2="70"/>
      <line x1="0" y1="0" x2="-121" y2="-70"/>
    </g>

    <!-- orbiting nodes -->
    <g font-size="15" font-weight="500" text-anchor="middle">
      <g transform="translate(0,-140)"><rect x="-46" y="-17" width="92" height="34" rx="8" fill="#0e0e12" stroke="#27272a"/><text y="5" fill="#d4d4d8">Document</text></g>
      <g transform="translate(121,-70)"><rect x="-34" y="-17" width="68" height="34" rx="8" fill="#0e0e12" stroke="#27272a"/><text y="5" fill="#d4d4d8">Task</text></g>
      <g transform="translate(121,70)"><rect x="-40" y="-17" width="80" height="34" rx="8" fill="#0e0e12" stroke="#27272a"/><text y="5" fill="#d4d4d8">Person</text></g>
      <g transform="translate(0,140)"><rect x="-36" y="-17" width="72" height="34" rx="8" fill="#0e0e12" stroke="#27272a"/><text y="5" fill="#d4d4d8">Event</text></g>
      <g transform="translate(-121,70)"><rect x="-46" y="-17" width="92" height="34" rx="8" fill="#0e0e12" stroke="#27272a"/><text y="5" fill="#d4d4d8">Message</text></g>
      <g transform="translate(-121,-70)"><rect x="-52" y="-17" width="104" height="34" rx="8" fill="#0e0e12" stroke="#27272a"/><text y="5" fill="#d4d4d8">Agent plan</text></g>
    </g>

    <!-- centre object -->
    <g text-anchor="middle">
      <rect x="-58" y="-26" width="116" height="52" rx="11" fill="#1d4ed8" fill-opacity="0.18" stroke="#60a5fa" stroke-width="1.5"/>
      <text y="6" font-size="19" font-weight="600" fill="#fafafa">Project</text>
    </g>
  </g>
</svg>
