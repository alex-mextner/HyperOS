name: Normalize Mesh and Micro-App references

on:
  push:
    branches:
      - feat/agent-mesh-microapps-portal
    paths:
      - '.github/workflows/normalize-mesh-microapps.yml'

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/agent-mesh-microapps-portal
          fetch-depth: 0

      - name: Normalize references and public copy
        shell: python
        run: |
          from pathlib import Path

          branch_files = [
              Path('README.md'),
              Path('engineering-bible/docs/architecture/AOS-ARCH-009.md'),
              Path('engineering-bible/docs/architecture/AOS-ARCH-010.md'),
              Path('engineering-bible/docs/product/AOS-PROD-003.md'),
              Path('engineering-bible/docs/vision/AOS-VSN-001.md'),
              Path('engineering-bible/docs/product/PROD-018-text-to-micro-app-builder.md'),
              Path('site/src/generated/bible/architecture/AOS-ARCH-009.md'),
              Path('site/src/generated/bible/architecture/AOS-ARCH-010.md'),
              Path('site/src/generated/bible/product/AOS-PROD-003.md'),
              Path('site/src/generated/bible/vision/AOS-VSN-001.md'),
              Path('site/src/generated/bible/product/PROD-018-text-to-micro-app-builder.md'),
              Path('site/src/generated/bible/research/RES-017-mesh-dtn-prior-art.md'),
              Path('site/src/data/content.ts'),
          ]

          replacements = {
              'PLAN-017-mesh-and-microapps.md': 'PLAN-019-mesh-and-microapps.md',
              'AOS-PLAN-017': 'AOS-PLAN-019',
              'HW-018-lora-mesh-hardware.md': 'HW-021-lora-mesh-hardware.md',
              'embedded portal surface': 'embedded web surface',
              'Engineering bible and in-portal document viewer': 'Cross-linked Engineering Bible and stable specifications',
              'Engineering Bible, portal, task model and flagship programme specifications are live.': 'The Engineering Bible, task model and flagship programme specifications are published.',
          }

          for path in branch_files:
              if not path.exists():
                  continue
              text = path.read_text(encoding='utf-8')
              updated = text
              for old, new in replacements.items():
                  updated = updated.replace(old, new)
              if updated != text:
                  path.write_text(updated, encoding='utf-8')

          for stale in [
              Path('site/src/generated/bible/hardware/HW-018-lora-mesh-hardware.md'),
              Path('site/src/generated/bible/planning/PLAN-017-mesh-and-microapps.md'),
          ]:
              stale.unlink(missing_ok=True)

          forbidden = [
              'baked at build time',
              'fetched at build time',
              'during this build',
              'marketing site',
              'inside the portal',
              'without being redirected',
              'chips below replace',
              'issue feed',
              'Live issues were unavailable',
              'API is unavailable',
              'GitHub is unavailable',
              'Portal obligations',
              'in-portal document viewer',
          ]
          public_files = list(Path('site/src/pages').rglob('*.astro')) + list(Path('site/src/components').rglob('*.astro')) + list(Path('site/src/components').rglob('*.tsx'))
          published_docs = list(Path('site/src/generated/bible').rglob('*.md'))
          failures = []
          for path in public_files + published_docs:
              text = path.read_text(encoding='utf-8')
              for phrase in forbidden:
                  if phrase.lower() in text.lower():
                      failures.append(f'{path}: {phrase}')
          if failures:
              raise SystemExit('\n'.join(failures))

      - name: Remove one-time workflow and commit
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/normalize-mesh-microapps.yml
          git config user.name 'Agent OS Automation'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No changes required.'
            exit 0
          fi
          git commit -m 'fix: normalize Mesh IDs and public content copy'
          git push origin HEAD:feat/agent-mesh-microapps-portal
